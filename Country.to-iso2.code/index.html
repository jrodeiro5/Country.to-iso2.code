        // Create a case-insensitive version of the countryCodes object
        const caseInsensitiveCountryCodes = Object.fromEntries(
            Object.entries(countryCodes).map(([country, code]) => [country.toLowerCase(), code])
        );

        // Create a reverse mapping for code to country (case-insensitive)
        const caseInsensitiveCodeToCountry = Object.fromEntries(
            Object.entries(countryCodes).map(([country, code]) => [code.toLowerCase(), country])
        );

        let mode = 'countryToCode';
        const input = document.getElementById('input');
        const result = document.getElementById('result');
        const suggestionsDiv = document.getElementById('suggestions');
        const copyButton = document.querySelector('button[onclick="copyToClipboard()"]');

        function switchMode(newMode) {
            mode = newMode;
            document.getElementById('countryToCodeBtn').classList.toggle('active', mode === 'countryToCode');
            document.getElementById('codeToCountryBtn').classList.toggle('active', mode === 'codeToCountry');
            input.value = '';
            result.textContent = '';
            copyButton.style.display = 'none';
            input.placeholder = mode === 'countryToCode' ? 'Enter country name' : 'Enter ISO code';
        }

        function convert() {
            const inputValue = input.value.toLowerCase();
            if (mode === 'countryToCode') {
                if (caseInsensitiveCountryCodes.hasOwnProperty(inputValue)) {
                    result.textContent = `PULL_${caseInsensitiveCountryCodes[inputValue]}`;
                    copyButton.style.display = 'block';
                } else {
                    result.textContent = "Country not found";
                    copyButton.style.display = 'none';
                }
            } else {
                if (caseInsensitiveCodeToCountry.hasOwnProperty(inputValue)) {
                    const countryName = caseInsensitiveCodeToCountry[inputValue];
                    result.textContent = countryName.charAt(0).toUpperCase() + countryName.slice(1);
                    copyButton.style.display = 'block';
                } else {
                    result.textContent = "Code not found";
                    copyButton.style.display = 'none';
                }
            }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(result.textContent).then(() => {
                alert('Copied to clipboard!');
            });
        }

        input.addEventListener('input', function() {
            const inputValue = this.value.toLowerCase();
            let suggestions = [];
            if (mode === 'countryToCode') {
                suggestions = Object.keys(caseInsensitiveCountryCodes).filter(country => country.startsWith(inputValue));
            } else {
                suggestions = Object.keys(caseInsensitiveCodeToCountry).filter(code => code.startsWith(inputValue));
            }
            showSuggestions(suggestions);
        });

        function showSuggestions(suggestions) {
            if (suggestions.length > 0 && input.value) {
                suggestionsDiv.innerHTML = suggestions.map(s => {
                    // Capitalize the first letter of each word for better readability
                    const displayText = s.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                    return `<div class="suggestion-item">${displayText}</div>`;
                }).join('');
                suggestionsDiv.style.display = 'block';
                suggestionsDiv.querySelectorAll('.suggestion-item').forEach(item => {
                    item.addEventListener('click', function() {
                        input.value = this.textContent;
                        suggestionsDiv.style.display = 'none';
                        convert();
                    });
                });
            } else {
                suggestionsDiv.style.display = 'none';
            }
        }

        document.addEventListener('click', function(e) {
            if (e.target !== input && e.target !== suggestionsDiv) {
                suggestionsDiv.style.display = 'none';
            }
        });
