<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Code Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pull-bear-black: #000000;
            --pull-bear-white: #FFFFFF;
            --pull-bear-gray: #F2F2F2;
            --pull-bear-beige: #E5E0D5;
        }

        body {
            font-family: 'Roboto', sans-serif;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--pull-bear-white);
            color: var(--pull-bear-black);
            line-height: 1.6;
        }

        .container {
            background-color: var(--pull-bear-white);
            padding: 20px;
            border: 1px solid var(--pull-bear-black);
        }

        h1 {
            color: var(--pull-bear-black);
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        input {
            font-size: 14px;
            padding: 8px 10px;
            border: 1px solid var(--pull-bear-black);
            transition: all 0.3s ease;
            font-weight: 300;
            margin-bottom: 10px;
        }

        input:focus {
            outline: none;
            background-color: var(--pull-bear-gray);
        }

        button {
            font-size: 14px;
            padding: 8px 15px;
            background-color: var(--pull-bear-black);
            color: var(--pull-bear-white);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: var(--pull-bear-gray);
            color: var(--pull-bear-black);
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            padding: 10px;
            background-color: var(--pull-bear-gray);
            border-left: 4px solid var(--pull-bear-black);
        }

        .suggestions {
            background-color: var(--pull-bear-white);
            border: 1px solid var(--pull-bear-black);
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            z-index: 10;
        }

        .suggestion-item {
            padding: 8px 10px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .suggestion-item:hover {
            background-color: var(--pull-bear-gray);
        }

        .switch-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .switch-container button {
            margin: 0 4px;
            padding: 6px 10px;
            font-size: 14px;
            background-color: var(--pull-bear-white);
            color: var(--pull-bear-black);
            border: 1px solid var(--pull-bear-black);
            font-weight: 400;
        }

        .switch-container button.active {
            background-color: var(--pull-bear-black);
            color: var(--pull-bear-white);
        }

        @media (max-width: 430px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Country Code Converter</h1>
        <div class="switch-container">
            <button id="countryToCodeBtn" class="active" onclick="switchMode('countryToCode')">Country to Code</button>
            <button id="codeToCountryBtn" onclick="switchMode('codeToCountry')">Code to Country</button>
        </div>
        <div class="input-group">
            <input type="text" id="input" placeholder="Enter country name">
            <button onclick="convert()">Convert</button>
        </div>
        <div id="suggestions" class="suggestions" style="display: none;"></div>
        <div id="result"></div>
        <button onclick="copyToClipboard()" style="display: none; margin-top: 10px;">Copy to Clipboard</button>
    </div>

        // Create a case-insensitive version of the countryCodes object
const caseInsensitiveCountryCodes = Object.fromEntries(
    Object.entries(countryCodes).map(([country, code]) => [country.toLowerCase(), code])
);

// Create a reverse mapping for code to country (case-insensitive)
const caseInsensitiveCodeToCountry = Object.fromEntries(
    Object.entries(countryCodes).map(([country, code]) => [code.toLowerCase(), country])
);

let mode = 'countryToCode';
const input = document.getElementById('input');
const result = document.getElementById('result');
const suggestionsDiv = document.getElementById('suggestions');
const copyButton = document.querySelector('button[onclick="copyToClipboard()"]');

function switchMode(newMode) {
    mode = newMode;
    document.getElementById('countryToCodeBtn').classList.toggle('active', mode === 'countryToCode');
    document.getElementById('codeToCountryBtn').classList.toggle('active', mode === 'codeToCountry');
    input.value = '';
    result.textContent = '';
    copyButton.style.display = 'none';
    input.placeholder = mode === 'countryToCode' ? 'Enter country name' : 'Enter ISO code';
}

function convert() {
    const inputValue = input.value.toLowerCase();
    if (mode === 'countryToCode') {
        if (caseInsensitiveCountryCodes.hasOwnProperty(inputValue)) {
            const code = caseInsensitiveCountryCodes[inputValue];
            // Add 'PULL_' only if it is not already part of the code
            result.textContent = code.startsWith('PULL_') ? code : `PULL_${code}`;
            copyButton.style.display = 'block';
        } else {
            result.textContent = "Country not found";
            copyButton.style.display = 'none';
        }
    } else {
        if (caseInsensitiveCodeToCountry.hasOwnProperty(inputValue)) {
            const countryName = caseInsensitiveCodeToCountry[inputValue];
            result.textContent = countryName.charAt(0).toUpperCase() + countryName.slice(1);
            copyButton.style.display = 'block';
        } else {
            result.textContent = "Code not found";
            copyButton.style.display = 'none';
        }
    }
}

function copyToClipboard() {
    navigator.clipboard.writeText(result.textContent).then(() => {
        alert('Copied to clipboard!');
    });
}

input.addEventListener('input', function() {
    const inputValue = this.value.toLowerCase();
    let suggestions = [];
    if (mode === 'countryToCode') {
        suggestions = Object.keys(caseInsensitiveCountryCodes).filter(country => country.startsWith(inputValue));
    } else {
        suggestions = Object.keys(caseInsensitiveCodeToCountry).filter(code => code.startsWith(inputValue));
    }
    showSuggestions(suggestions);
});

function showSuggestions(suggestions) {
    if (suggestions.length > 0 && input.value) {
        suggestionsDiv.innerHTML = suggestions.map(s => {
            const displayText = s.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            return `<div class="suggestion-item">${displayText}</div>`;
        }).join('');
        suggestionsDiv.style.display = 'block';
        suggestionsDiv.querySelectorAll('.suggestion-item').forEach(item => {
            item.addEventListener('click', function() {
                input.value = this.textContent;
                suggestionsDiv.style.display = 'none';
                convert();
            });
        });
    } else {
        suggestionsDiv.style.display = 'none';
    }
}

document.addEventListener('click', function(e) {
    if (e.target !== input && e.target !== suggestionsDiv) {
        suggestionsDiv.style.display = 'none';
    }
});

    </script>
