<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-WZ3F3B7C');</script>
    <!-- End Google Tag Manager -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Code Converter</title>
    <!-- Google Fonts: Roboto and Noto Emoji -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Noto+Emoji&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="https://cdn.overtracking.com/t/thyN9X0Fz3bgRfrSJ/"></script>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WZ3F3B7C"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
     
    <button class="mode-toggle" onclick="toggleDarkMode()">🌓</button>
    <div class="container">
        <h1>Country Code Converter</h1>
        <div class="switch-container">
            <button id="countryToCodeBtn" class="active" onclick="switchMode('countryToCode')">Country to Code</button>
            <button id="codeToCountryBtn" onclick="switchMode('codeToCountry')">Code to Country</button>
        </div>
        <div class="input-group">
            <input type="text" id="input" placeholder="Enter country name">
            <button onclick="convert()">Convert</button>
        </div>
        <div id="suggestions" class="suggestions" style="display: none;"></div>
        <div id="result"></div>
        <button onclick="copyToClipboard()" style="display: none; margin-top: 10px;">Copy to Clipboard</button>
        <div class="flag-container">
            <span id="flag" class="flag"></span>
            <div id="typicalElement" class="typical-element"></div>
        </div>
    </div>
    
    <!-- Load data first -->
    <script src="js/data/countries.js"></script>
    <script src="js/data/flags.js"></script>
    
    <!-- Then load application logic -->
    <script src="js/converter.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
