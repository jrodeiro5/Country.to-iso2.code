    <style>
        :root {
            --pull-bear-black: #000000;
            --pull-bear-white: #FFFFFF;
            --pull-bear-gray: #F2F2F2;
            --pull-bear-beige: #E5E0D5;
        }

        body {
            font-family: 'Roboto', sans-serif;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--pull-bear-white);
            color: var(--pull-bear-black);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            --pull-bear-black: #FFFFFF;
            --pull-bear-white: #121212;
            --pull-bear-gray: #333333;
            --pull-bear-beige: #4A4A4A;
        }

        .container {
            background-color: var(--pull-bear-white);
            padding: 20px;
            border: 1px solid var(--pull-bear-black);
            transition: background-color 0.3s, border-color 0.3s;
        }

        h1 {
            color: var(--pull-bear-black);
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        input {
            font-size: 14px;
            padding: 8px 10px;
            border: 1px solid var(--pull-bear-black);
            transition: all 0.3s ease;
            font-weight: 300;
            margin-bottom: 10px;
            background-color: var(--pull-bear-white);
            color: var(--pull-bear-black);
        }

        input:focus {
            outline: none;
            background-color: var(--pull-bear-gray);
        }

        button {
            font-size: 14px;
            padding: 8px 15px;
            background-color: var(--pull-bear-black);
            color: var(--pull-bear-white);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: var(--pull-bear-gray);
            color: var(--pull-bear-black);
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            padding: 10px;
            background-color: var(--pull-bear-gray);
            border-left: 4px solid var(--pull-bear-black);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .suggestions {
            background-color: var(--pull-bear-white);
            border: 1px solid var(--pull-bear-black);
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            z-index: 10;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .suggestion-item {
            padding: 8px 10px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .suggestion-item:hover {
            background-color: var(--pull-bear-gray);
        }

        .switch-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .switch-container button {
            margin: 0 4px;
            padding: 6px 10px;
            font-size: 14px;
            background-color: var(--pull-bear-white);
            color: var(--pull-bear-black);
            border: 1px solid var(--pull-bear-black);
            font-weight: 400;
        }

        .switch-container button.active {
            background-color: var(--pull-bear-black);
            color: var(--pull-bear-white);
        }

        .mode-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .mode-toggle:hover {
            transform: scale(1.1);
        }

        .flag-container {
            text-align: center;
            margin-top: 20px;
            height: 100px;
            position: relative;
            font-family: 'Noto Emoji', sans-serif;
            font-size: 3rem; /* Emoji size */
        }

        .flag {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .typical-element {
            font-size: 48px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        @media (max-width: 430px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.5em;
            }
        }

        .flag-container img.emoji {
            height: 1em;
            width: 1em;
            margin: 0 .05em 0 .1em;
            vertical-align: -0.1em;
        }

        // Create a case-insensitive version of the countryCodes object
        const caseInsensitiveCountryCodes = Object.fromEntries(
            Object.entries(countryCodes).map(([country, code]) => [country.toLowerCase(), code])
        );

        // Create a reverse mapping for code to country (case-insensitive)
        const caseInsensitiveCodeToCountry = Object.fromEntries(
            Object.entries(countryCodes).map(([country, code]) => [code.toLowerCase(), country])
        );

        let mode = 'countryToCode';
        const input = document.getElementById('input');
        const result = document.getElementById('result');
        const suggestionsDiv = document.getElementById('suggestions');
        const copyButton = document.querySelector('button[onclick="copyToClipboard()"]');
        const flagImg = document.getElementById('flag');
        const typicalElementDiv = document.getElementById('typicalElement');

        function switchMode(newMode) {
            mode = newMode;
            document.getElementById('countryToCodeBtn').classList.toggle('active', mode === 'countryToCode');
            document.getElementById('codeToCountryBtn').classList.toggle('active', mode === 'codeToCountry');
            input.value = '';
            result.textContent = '';
            copyButton.style.display = 'none';
            input.placeholder = mode === 'countryToCode' ? 'Enter country name' : 'Enter ISO code';
            hideFlag();
        }

        function convert() {
            const inputValue = input.value.toLowerCase();
            if (mode === 'countryToCode') {
                if (caseInsensitiveCountryCodes.hasOwnProperty(inputValue)) {
                    const code = caseInsensitiveCountryCodes[inputValue];
                    result.textContent = code.startsWith('PULL_') ? code : `PULL_${code}`;
                    copyButton.style.display = 'block';
                    showFlag(inputValue);
                } else {
                    result.textContent = "Country not found";
                    copyButton.style.display = 'none';
                    hideFlag();
                }
            } else {
                if (caseInsensitiveCodeToCountry.hasOwnProperty(inputValue)) {
                    const countryName = caseInsensitiveCodeToCountry[inputValue];
                    result.textContent = countryName.charAt(0).toUpperCase() + countryName.slice(1);
                    copyButton.style.display = 'block';
                    showFlag(countryName.toLowerCase());
                } else {
                    result.textContent = "Code not found";
                    copyButton.style.display = 'none';
                    hideFlag();
                }
            }
        }

        function showFlag(country) {
            const code = caseInsensitiveCountryCodes[country].toLowerCase();
            flagImg.src = `https://flagcdn.com/w160/${code}.png`;
            flagImg.alt = `Flag of ${country}`;
            flagImg.style.opacity = '1';
            
            if (typicalElements[country]) {
                typicalElementDiv.textContent = typicalElements[country];
                typicalElementDiv.style.opacity = '1';
                typicalElementDiv.style.transform = 'translate(-50%, -50%) scale(1.2)';
            } else {
                typicalElementDiv.style.opacity = '0';
            }
        }

        function hideFlag() {
            flagImg.style.opacity = '0';
            typicalElementDiv.style.opacity = '0';
            typicalElementDiv.style.transform = 'translate(-50%, -50%) scale(1)';
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(result.textContent).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        input.addEventListener('input', function() {
            const inputValue = this.value.toLowerCase();
            let suggestions = [];
            if (mode === 'countryToCode') {
                suggestions = Object.keys(caseInsensitiveCountryCodes).filter(country => country.startsWith(inputValue));
            } else {
                suggestions = Object.keys(caseInsensitiveCodeToCountry).filter(code => code.startsWith(inputValue));
            }
            showSuggestions(suggestions);
        });

        function showSuggestions(suggestions) {
            if (suggestions.length > 0 && input.value) {
                suggestionsDiv.innerHTML = suggestions.map(s => {
                    const displayText = s.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                    return `<div class="suggestion-item">${displayText}</div>`;
                }).join('');
                suggestionsDiv.style.display = 'block';
                suggestionsDiv.querySelectorAll('.suggestion-item').forEach(item => {
                    item.addEventListener('click', function() {
                        input.value = this.textContent;
                        suggestionsDiv.style.display = 'none';
                        convert();
                    });
                });
            } else {
                suggestionsDiv.style.display = 'none';
            }
        }

        document.addEventListener('click', function(e) {
            if (e.target !== input && e.target !== suggestionsDiv) {
                suggestionsDiv.style.display = 'none';
            }

            function displayFlag(countryCode) {
            const flagElement = document.getElementById('flag');
            const flag = countryCode.toUpperCase().replace(/./g, char => 
                String.fromCodePoint(char.charCodeAt(0) + 127397)
            );
            flagElement.textContent = flag;
            twemoji.parse(flagElement);
        }

        });
        
        twemoji.parse(document.body);
